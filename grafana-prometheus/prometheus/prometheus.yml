global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    environment: "production"

# Archivos de reglas de alertas (opcional)
# rule_files:
#   - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus se monitorea a sí mismo
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Descomenta cuando agregues node-exporter al stack
  # - job_name: "node-exporter"
  #   static_configs:
  #     - targets: ["node-exporter:9100"]

  # Descomenta para monitorear cAdvisor (métricas de contenedores)
  # - job_name: "cadvisor"
  #   static_configs:
  #     - targets: ["cadvisor:8080"]
