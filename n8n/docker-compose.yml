services:
  n8n:
    image: n8nio/n8n:${N8N_VERSION:-1.93.0}
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      # --- Servidor ---
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-}

      # --- Seguridad ---
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}

      # --- Base de datos (SQLite por defecto, descomenta para Postgres) ---
      # DB_TYPE: postgresdb
      # DB_POSTGRESDB_HOST: postgres
      # DB_POSTGRESDB_PORT: 5432
      # DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      # DB_POSTGRESDB_USER: ${N8N_DB_USER:-n8n}
      # DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}

      # --- Comportamiento ---
      N8N_METRICS: ${N8N_METRICS:-false}
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: ${N8N_EXECUTIONS_RETENTION_DAYS:-30}
      N8N_LOG_LEVEL: ${N8N_LOG_LEVEL:-warn}
      GENERIC_TIMEZONE: ${N8N_TIMEZONE:-America/Bogota}
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_DIAGNOSTICS_ENABLED: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  n8n_data:
